version: "1.0"
# MIMIC-III table configuration for the EOL Mistrust pipeline.
# Reproduces the data schema from Boag et al. 2018,
# "Racial Disparities and Mistrust in End-of-Life Care."

tables:
  # --- Core clinical tables ---

  patients:
    file_path: "mimiciii_clinical/patients.csv"
    patient_id: "subject_id"
    timestamp: null
    attributes:
      - "gender"
      - "dob"
      - "dod"
      - "dod_hosp"
      - "dod_ssn"
      - "expire_flag"

  admissions:
    file_path: "mimiciii_clinical/admissions.csv"
    patient_id: "subject_id"
    timestamp: "admittime"
    attributes:
      - "hadm_id"
      - "dischtime"
      - "deathtime"
      - "admission_type"
      - "admission_location"
      - "discharge_location"
      - "insurance"
      - "language"
      - "religion"
      - "marital_status"
      - "ethnicity"
      - "edregtime"
      - "edouttime"
      - "diagnosis"
      - "hospital_expire_flag"
      - "has_chartevents_data"

  icustays:
    file_path: "mimiciii_clinical/icustays.csv"
    patient_id: "subject_id"
    timestamp: "intime"
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "dbsource"
      - "first_careunit"
      - "last_careunit"
      - "outtime"
      - "los"

  # --- Coded event tables (joined to admissions for timestamps) ---

  diagnoses_icd:
    file_path: "mimiciii_clinical/diagnoses_icd.csv"
    patient_id: "subject_id"
    join:
      - file_path: "mimiciii_clinical/admissions.csv"
        "on": "hadm_id"
        how: "inner"
        columns:
          - "dischtime"
    timestamp: "dischtime"
    attributes:
      - "hadm_id"
      - "icd9_code"
      - "seq_num"

  prescriptions:
    file_path: "mimiciii_clinical/prescriptions.csv"
    patient_id: "subject_id"
    timestamp: "startdate"
    join:
      - file_path: "mimiciii_clinical/admissions.csv"
        "on": "hadm_id"
        how: "inner"
        columns:
          - "dischtime"
    attributes:
      - "hadm_id"
      - "drug"
      - "drug_type"
      - "drug_name_poe"
      - "drug_name_generic"
      - "formulary_drug_cd"
      - "gsn"
      - "ndc"
      - "prod_strength"
      - "dose_val_rx"
      - "dose_unit_rx"
      - "form_val_disp"
      - "form_unit_disp"
      - "route"
      - "enddate"

  procedures_icd:
    file_path: "mimiciii_clinical/procedures_icd.csv"
    patient_id: "subject_id"
    join:
      - file_path: "mimiciii_clinical/admissions.csv"
        "on": "hadm_id"
        how: "inner"
        columns:
          - "dischtime"
    timestamp: "dischtime"
    attributes:
      - "hadm_id"
      - "icd9_code"
      - "seq_num"

  # --- Free-text clinical notes ---

  noteevents:
    file_path: "mimiciii_notes/noteevents.csv"
    patient_id: "subject_id"
    timestamp: "charttime"
    attributes:
      - "row_id"
      - "hadm_id"
      - "chartdate"
      - "text"
      - "category"
      - "description"
      - "storetime"
      - "iserror"

  # --- Chart event reference and time-series data ---

  d_items:
    file_path: "mimiciii_clinical/d_items.csv"
    patient_id: null
    timestamp: null
    attributes:
      - "itemid"
      - "label"
      - "abbreviation"
      - "dbsource"
      - "linksto"
      - "category"
      - "unitname"
      - "param_type"
      - "conceptid"

  chartevents:
    file_path: "mimiciii_clinical/chartevents.csv"
    patient_id: "subject_id"
    timestamp: "charttime"
    join:
      - file_path: "mimiciii_clinical/d_items.csv"
        "on": "itemid"
        how: "left"
        columns:
          - "label"
          - "dbsource"
          - "category"
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "itemid"
      - "storetime"
      - "cgid"
      - "value"
      - "valuenum"
      - "valueuom"
      - "warning"
      - "error"
      - "resultstatus"
      - "stopped"
      - "label"
      - "dbsource"
      - "category"

  # --- Derived severity scores and treatment duration tables ---

  ventdurations:
    file_path: "mimiciii_derived/ventdurations.csv"
    patient_id: "subject_id"
    timestamp: "starttime"
    join:
      - file_path: "mimiciii_clinical/icustays.csv"
        "on": "icustay_id"
        how: "left"
        columns:
          - "subject_id"
          - "hadm_id"
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "ventnum"
      - "endtime"
      - "duration_hours"

  vasopressordurations:
    file_path: "mimiciii_derived/vasopressordurations.csv"
    patient_id: "subject_id"
    timestamp: "starttime"
    join:
      - file_path: "mimiciii_clinical/icustays.csv"
        "on": "icustay_id"
        how: "left"
        columns:
          - "subject_id"
          - "hadm_id"
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "vasonum"
      - "endtime"
      - "duration_hours"

  oasis:
    file_path: "mimiciii_derived/oasis.csv"
    patient_id: "subject_id"
    timestamp: null
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "oasis"

  sapsii:
    file_path: "mimiciii_derived/sapsii.csv"
    patient_id: "subject_id"
    timestamp: null
    attributes:
      - "hadm_id"
      - "icustay_id"
      - "sapsii"
