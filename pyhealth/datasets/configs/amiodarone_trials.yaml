# Configuration for AmiodaroneTrialDataset
# Defines how BaseDataset should load and parse the processed
# amiodarone clinical trial CSV generated by prepare_metadata().
#
# Each row in the CSV represents one clinical trial from Letelier
# et al. (2003), with features extracted and numerically encoded
# per Figures 5-6 of Kaul & Gordon (2024):
#   - patient_id: unique trial identifier
#     (e.g. "cowan_et_al_16_england_1986")
#   - visit_id: single visit per trial ("visit_<patient_id>")
#   - trial_name: original human-readable trial name
#   - amiodarone_total_24h_mg .. masked_assessor: converted features
#   - log_relative_risk: observed effect size Y (log RR)
#   - variance: within-trial variance V for Y
#   - split: "trusted" (10 placebo-controlled trials) or
#            "untrusted" (11 non-placebo trials used to train
#            the CMAPriorEncoder)
version: "5.0"
tables:
  amiodarone_trials:
    file_path: "amiodarone_trials-metadata-pyhealth.csv"
    patient_id: "patient_id"
    timestamp: null
    attributes:
    - "visit_id"
    - "trial_name"
    - "amiodarone_total_24h_mg"
    - "comparison_intensity"
    - "af_duration_gt_48h"
    - "outcome_time_gt_48h"
    - "mean_age"
    - "mean_la_size"
    - "fraction_male"
    - "fraction_cv_disease"
    - "followup_fraction"
    - "adequate_concealment"
    - "masked_patients"
    - "masked_caregiver"
    - "masked_assessor"
    - "log_relative_risk"
    - "variance"
    - "split"