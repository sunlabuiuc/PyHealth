# Daily and Sports Activities (DSA) — BaseDataset table config + dataset metadata.
# Point DSADataset(root=...) at the directory that contains folders a01 … a19.
#
# On first use, a manifest CSV (dsa_manifest.csv) is created under ``root`` so
# BaseDataset can load segment rows like other PyHealth datasets.

version: "5.0"
tables:
  dsa_segments:
    file_path: "dsa_manifest.csv"
    patient_id: subject_id
    timestamp: null
    attributes:
      - segment_path
      - activity_name
      - activity_code

dataset:
  name: DSA
  internal_name: dsa
  description: >-
    Time-series from 5 IMU units (45 channels) at 25 Hz; 5 s segments (125 samples).
  modality: time_series
  primary_task: activity_recognition
  tasks:
    - activity_recognition
  task_configs:
    activity_recognition:
      label_column: activity
      label_mapping:
        A1: sitting
        A2: standing
        A3: lying_on_back
        A4: lying_on_right_side
        A5: ascending_stairs
        A6: descending_stairs
        A7: standing_in_elevator_still
        A8: moving_around_in_elevator
        A9: walking_in_parking_lot
        A10: walking_on_treadmill_flat
        A11: walking_on_treadmill_inclined
        A12: running_on_treadmill
        A13: exercising_on_stepper
        A14: exercising_on_cross_trainer
        A15: cycling_on_exercise_bike_horizontal
        A16: cycling_on_exercise_bike_vertical
        A17: rowing
        A18: jumping
        A19: playing_basketball
  units:
    - T: Torso
    - RA: Right Arm
    - LA: Left Arm
    - RL: Right Leg
    - LL: Left Leg
  sensors:
    - xacc: X-axis Accelerometer
    - yacc: Y-axis Accelerometer
    - zacc: Z-axis Accelerometer
    - xgyro: X-axis Gyroscope
    - ygyro: Y-axis Gyroscope
    - zgyro: Z-axis Gyroscope
    - xmag: X-axis Magnetometer
    - ymag: Y-axis Magnetometer
    - zmag: Z-axis Magnetometer
  num_subjects: 8
  num_segments_per_activity: 60
  num_activities: 19
  sampling_frequency: 25
  segment_duration_seconds: 5
  # 60 segments × 8 subjects per activity (dataset description)
  total_segments_per_activity: 480
  data_structure:
    num_columns: 45
    num_rows: 125
    column_ranges:
      unit_1_T: "1-9"
      unit_2_RA: "10-18"
      unit_3_LA: "19-27"
      unit_4_RL: "28-36"
      unit_5_LL: "37-45"
  layout:
    activity_dir_pattern: "^a\\d{2}$"
    subject_dir_pattern: "^p\\d+$"
    segment_file_pattern: "^s\\d+\\.txt$"
    file_extension: ".txt"
